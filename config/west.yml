manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: caksoylar
      url-base: https://github.com/caksoylar
    - name: carrefinho
      url-base: https://github.com/carrefinho
  projects:
    # TEMP DIAGNOSTIC: zephyr fork override removed to test whether the
    # NANOPB Kconfig "Aborting due to Kconfig warnings" failure on the
    # dongle+studio build is caused by our fork, or is an unrelated,
    # pre-existing issue on current zmk main (nanopb isn't in
    # zmkfirmware/zephyr's own west.yml either, unlike upstream zephyr's).
    - name: zmk
      remote: zmkfirmware
      revision: main
      import: app/west.yml
    - name: zmk-rgbled-widget
      remote: caksoylar
      revision: main
    - name: prospector-zmk-module
      remote: carrefinho
      revision: feat/new-status-screens
  self:
    path: config
