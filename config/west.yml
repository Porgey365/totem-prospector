    # hitting. Revert to zmkfirmware/main once confirmed either way.
    - name: zmk
      remote: akira-toriyama
      revision: feat/auto-unpair-on-key-mismatch
      import: app/west.yml
    - name: zmk-rgbled-widget
      remote: caksoylar
      revision: main
    - name: prospector-zmk-module
      remote: carrefinho
      revision: feat/new-status-screens
  self:
