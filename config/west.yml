manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: caksoylar
      url-base: https://github.com/caksoylar
    - name: bwshockley
      url-base: https://github.com/bwshockley
    - name: porgey365
      url-base: https://github.com/Porgey365
  projects:
    # Overrides the "zephyr" project that zmk/app/west.yml below would
    # otherwise import from zmkfirmware/zephyr@v4.1.0+zmk-fixes. Same base
    # commit, plus a 2-line patch (drivers/sensor/apds9960) accepting our
    # dongle's clone APDS9960 chip id (0x9F) -- the stock driver hard-rejects
    # any id besides 0xAB/0x9C and there's no Kconfig to relax it. Import spec
    # copied verbatim from zmk/app/west.yml so submodules still resolve.
    - name: zephyr
      remote: porgey365
      revision: totem-apds9960-clone-id
      clone-depth: 1
      import:
        name-blocklist:
          - ci-tools
          - hal_altera
          - hal_cypress
          - hal_infineon
          - hal_microchip
          - hal_nxp
          - hal_openisa
          - hal_xtensa
          - hal_st
          - hal_ti
          - loramac-node
          - mcuboot
          - mcumgr
          - net-tools
          - openthread
          - edtt
          - trusted-firmware-m
    # zmk/app/west.yml also lists hal_stm32, lvgl, and zmk-studio-messages as
    # sibling projects to zephyr -- block only "zephyr" from this import
    # (already declared above, pointed at our fork) rather than duplicating
    # the whole project name, which caused west to drop those other projects.
    - name: zmk
      remote: zmkfirmware
      revision: main
      import:
        file: app/west.yml
        name-blocklist:
          - zephyr
    - name: zmk-rgbled-widget
      remote: caksoylar
      revision: main
    # Cornix's dongle-screen module: same Prospector-compatible board (display
    # + APDS9960), but adds a display idle timeout (auto-off after inactivity)
    # that carrefinho/prospector-zmk-module doesn't support. Devicetree pin
    # mapping for xiao_ble is byte-for-byte identical to prospector_adapter's,
    # confirmed against carrefinho/prospector-zmk-module@feat/new-status-screens
    # -- same physical hardware, so no pinout changes needed. Still binds the
    # sensor via the stock Zephyr avago,apds9960 driver, so the zephyr fork
    # above (clone chip id 0x9F) is still required.
    - name: zmk-dongle-screen
      remote: bwshockley
      revision: main
  # zmk/app/west.yml sets this too, to re-include zephyr's "optional" group
  # (excluded by zephyr's own west.yml by default) -- needed for the Studio
  # build's nanopb dependency. Doesn't automatically propagate through our
  # filtered (name-blocklist) import above, so declaring it here directly.
  group-filter: [+optional]
  self:
    path: config
