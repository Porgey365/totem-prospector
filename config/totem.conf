# Shared settings applied to every TOTEM build (left, right, dongle).
# Hardware-specific options live in the per-shield .conf files under
# config/boards/shields/totem/ so they don't leak into builds that break on
# them (the dongle uses prospector_adapter, which has no RGB LED).
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_POINTING=y

# DIAGNOSTIC: CONFIG_ZMK_BLE_EXPERIMENTAL_CONN and CONFIG_BT_SMP_ALLOW_UNAUTH_OVERWRITE
# temporarily removed. Central<->peripheral pairing was failing every single
# connection attempt with "Security failed ... err 9" even from a fully clean,
# correctly-ordered settings_reset on both sides, which rules out stale bonds.
# These two were the only non-default BLE security/connection settings in this
# config, so testing with vanilla ZMK security behavior to isolate the cause.
