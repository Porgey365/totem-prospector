# Shared settings applied to every TOTEM build (left, right, dongle).
# Hardware-specific options live in the per-shield .conf files under
# config/boards/shields/totem/ so they don't leak into builds that break on
# them (the dongle uses prospector_adapter, which has no RGB LED).
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Let a device re-pair over an existing bond instead of rejecting the new
# pairing outright, so a stale bond on one side can't permanently block a
# fresh connection.
CONFIG_BT_SMP_ALLOW_UNAUTH_OVERWRITE=y
