# Split central: connects to 2 peripherals (left + right; no trackball in use).
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

# Needs a connection/bond slot for each peripheral (2) plus each BLE host
# profile (5, ZMK's default profile count). Per ZMK's own dongle docs.
CONFIG_BT_MAX_CONN=7
CONFIG_BT_MAX_PAIRED=7

# USB-powered dongle: never deep sleep, so the display and BLE links stay alive.
CONFIG_ZMK_SLEEP=n

# DIAGNOSTIC: force the internal RC oscillator instead of the external 32kHz
# crystal. Both peripherals fail BLE pairing with this dongle identically and
# worked fine paired with each other before the dongle existed -- ZMK's docs
# name a bad LF crystal as a known cause of exactly this symptom (fine over
# USB, unstable BLE connection-event timing). Remove if this doesn't help.
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y

# The dongle is the split central: fetch and proxy the halves' battery levels.
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# Prospector status screen preferences
CONFIG_PROSPECTOR_STATUS_SCREEN_OPERATOR=y
CONFIG_PROSPECTOR_USE_AMBIENT_LIGHT_SENSOR=y

# Diagnostic: USB logging to capture the pairing/reconnect sequence while the
# constant-disconnect issue is still open. Remove once resolved.
CONFIG_ZMK_USB_LOGGING=y
CONFIG_ZMK_LOG_LEVEL_DBG=y

# Hold early boot logs so USB serial can attach before they flush, and give
# the buffer room, so the boot-time pairing sequence is reliably capturable.
CONFIG_LOG_PROCESS_THREAD_STARTUP_DELAY_MS=5000
CONFIG_LOG_BUFFER_SIZE=8192
