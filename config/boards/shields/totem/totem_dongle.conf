# Split central: connects to 2 peripherals (left + right; no trackball in use).
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

# Needs a connection/bond slot for each peripheral (2) plus each BLE host
# profile (5, ZMK's default profile count). Per ZMK's own dongle docs.
CONFIG_BT_MAX_CONN=7
CONFIG_BT_MAX_PAIRED=7

# USB-powered dongle: never deep sleep, so the display and BLE links stay alive.
CONFIG_ZMK_SLEEP=n

# This dongle's external 32kHz LF crystal is bad (confirmed: both halves
# failed BLE security/pairing with this dongle specifically, every single
# connection, while pairing fine with each other directly). Forcing the
# internal RC oscillator instead of the external crystal fixed it. Keep this
# even though the RC oscillator is less power-efficient -- irrelevant here
# since the dongle is USB-powered and never sleeps (CONFIG_ZMK_SLEEP=n above).
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y

# The dongle is the split central: fetch and proxy the halves' battery levels.
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# Prospector status screen preferences
CONFIG_PROSPECTOR_STATUS_SCREEN_RADII=n
CONFIG_PROSPECTOR_STATUS_SCREEN_FIELD=n
CONFIG_PROSPECTOR_STATUS_SCREEN_OPERATOR=y
CONFIG_PROSPECTOR_USE_AMBIENT_LIGHT_SENSOR=y

# Turn the display off after this many seconds of no keyboard activity.
# Requires our prospector-zmk-module fork (see config/west.yml) -- upstream
# doesn't support this.
CONFIG_PROSPECTOR_IDLE_TIMEOUT_S=300

