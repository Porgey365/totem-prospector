# Right half: battery-powered split peripheral with an RGB LED (rgbled_adapter).
# The dongle is the split central, so this half stays a peripheral (see build.yaml).

# RGB LED Widget - Battery level indicator
CONFIG_RGBLED_WIDGET=y
CONFIG_RGBLED_WIDGET_BATTERY_SHOW_SELF=y
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=80
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_LOW=20

# Deep sleep mode (running on battery)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=30000
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000
